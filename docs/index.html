<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ValoRank</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --card:    #161b22;
      --card2:   #1c2332;
      --border:  #2a3a4a;
      --red:     #ff4655;
      --gold:    #f0b232;
      --blue:    #58a6ff;
      --text:    #e6edf3;
      --muted:   #7d8da5;
      --radius:  10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── ヘッダー ── */
    header {
      background: linear-gradient(135deg, #0d1117 0%, #1a0812 60%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 1.5rem; font-weight: 900; letter-spacing: 6px; }
    .logo span { color: var(--red); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    #updated { font-size: 0.75rem; color: var(--muted); }
    .refresh-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem;
      transition: .15s;
    }
    .refresh-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── メインコンテンツ ── */
    main { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    /* ── タブ ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab {
      padding: 7px 18px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); cursor: pointer;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 1.5px; transition: .15s;
    }
    .tab:hover { border-color: var(--red); color: var(--text); }
    .tab.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* ── グリッド ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

    /* ── カード共通 ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 16px; text-transform: uppercase;
    }
    .card-title span { color: var(--red); }

    /* ── トップカード ── */
    .top-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .top-card {
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      transition: border-color .15s;
    }
    .top-card:hover { border-color: var(--red); }
    .top-card-label { font-size: 0.68rem; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
    .top-card-player { font-weight: 700; font-size: 0.95rem; color: var(--gold); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-card-value { font-size: 1.4rem; font-weight: 900; color: var(--text); }

    /* ── テーブル ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead tr { border-bottom: 2px solid var(--border); }
    th {
      padding: 10px 14px; text-align: left;
      font-size: 0.68rem; letter-spacing: 1.5px; color: var(--muted);
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    th:hover { color: var(--red); }
    th.sorted { color: var(--gold); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--card2); }
    td { padding: 12px 14px; white-space: nowrap; }
    .medal { font-size: 1.1rem; }
    .player-link { text-decoration: none; }
    .pname { font-weight: 700; color: var(--text); }
    .ptag  { color: var(--muted); font-size: 0.78rem; }
    .player-link:hover .pname { color: var(--red); }
    .rank-badge { color: var(--gold); font-size: 0.8rem; }
    .hl { color: var(--gold); font-weight: 800; }

    /* ── ローディング ── */
    .loading { text-align: center; padding: 80px; color: var(--muted); }
    .dot { display: inline-block; animation: blink 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100% { opacity: .2; } 40% { opacity: 1; } }
  </style>
</head>
<body>

<header>
  <div class="logo">VALO<span>RANK</span></div>
  <div class="header-right">
    <span id="updated">読み込み中...</span>
    <button class="refresh-btn" onclick="loadData()">↺ 更新</button>
  </div>
</header>

<main>
  <div id="root"><div class="loading"><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span></div></div>
</main>

<script>
// ── 設定 ──────────────────────────────────────────────────────
const TABS = [
  { key:'acs',     label:'ACS',   stat:'scorePerRound',       disp: v=>`${v.toFixed(1)}` },
  { key:'kd',      label:'K/D',   stat:'kDRatio',             disp: v=>`${v.toFixed(2)}` },
  { key:'kast',    label:'KAST',  stat:'kAST',                disp: v=>`${v.toFixed(1)}%` },
  { key:'hs',      label:'HS%',   stat:'headshotsPercentage', disp: v=>`${v.toFixed(1)}%` },
  { key:'clutch',  label:'CLUTCH',stat:'__clutch__',          disp: v=>`${v.toFixed(1)}%` },
  { key:'adr',     label:'ADR',   stat:'damagePerRound',      disp: v=>`${v.toFixed(1)}` },
  { key:'winrate', label:'勝率',  stat:'matchesWinPct',       disp: v=>`${v.toFixed(1)}%` },
];

const RADAR_STATS = [
  { label:'ACS',    stat:'scorePerRound',       max:350 },
  { label:'K/D',    stat:'kDRatio',             max:3.0 },
  { label:'KAST',   stat:'kAST',                max:100 },
  { label:'HS%',    stat:'headshotsPercentage', max:50  },
  { label:'CLUTCH', stat:'__clutch__',          max:50  },
  { label:'ADR',    stat:'damagePerRound',       max:200 },
];

const TOP_CARDS = [
  { label:'TOP ACS',    stat:'scorePerRound',       fmt:v=>`${v.toFixed(1)}` },
  { label:'TOP K/D',    stat:'kDRatio',             fmt:v=>`${v.toFixed(2)}` },
  { label:'TOP KAST',   stat:'kAST',                fmt:v=>`${v.toFixed(1)}%` },
  { label:'TOP HS%',    stat:'headshotsPercentage', fmt:v=>`${v.toFixed(1)}%` },
  { label:'TOP CLUTCH', stat:'__clutch__',          fmt:v=>`${v.toFixed(1)}%` },
  { label:'TOP ADR',    stat:'damagePerRound',      fmt:v=>`${v.toFixed(1)}` },
];

const TABLE_COLS = [
  { label:'#',       key:'__rank__' },
  { label:'PLAYER',  key:'__name__' },
  { label:'RANK',    key:'__peak__' },
  { label:'ACS',     key:'scorePerRound' },
  { label:'K/D',     key:'kDRatio' },
  { label:'KDA',     key:'kDARatio' },
  { label:'KAST',    key:'kAST' },
  { label:'HS%',     key:'headshotsPercentage' },
  { label:'CLUTCH',  key:'__clutch__' },
  { label:'ADR',     key:'damagePerRound' },
  { label:'勝率',    key:'matchesWinPct' },
  { label:'試合数',  key:'matchesPlayed' },
];

const PALETTE = [
  '#ff4655','#f0b232','#58a6ff','#3fb950','#f778ba',
  '#a371f7','#39d353','#ff8c00','#00b4d8','#ff6b6b',
];

// ── 状態 ──────────────────────────────────────────────────────
let players = [];
let activeTab = 'acs';
let sortKey = 'scorePerRound';
let sortAsc = false;
let barChart = null;
let radarChart = null;

// ── ユーティリティ ────────────────────────────────────────────
function sv(p, stat) {
  if (stat === '__clutch__') return p.clutch_success_rate ?? 0;
  return p.stats?.[stat]?.value ?? 0;
}
function dv(p, stat) {
  if (stat === '__clutch__') {
    const r = (p.clutch_success_rate ?? 0).toFixed(1);
    return `${r}% <small style="color:var(--muted)">(${p.clutch_wins}/${p.clutch_attempts})</small>`;
  }
  return p.stats?.[stat]?.displayValue ?? '-';
}
function topPlayer(stat) {
  return [...players].sort((a,b)=>sv(b,stat)-sv(a,stat))[0];
}
function normalize(val, max) { return Math.min(100, (val / max) * 100); }
function timeAgo(iso) {
  const s = Math.floor((Date.now()-new Date(iso))/1000);
  if (s<60) return `${s}秒前`;
  if (s<3600) return `${Math.floor(s/60)}分前`;
  return `${Math.floor(s/3600)}時間前`;
}

// ── データ取得 ────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch(`stats.json?t=${Date.now()}`);
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    players = data.players ?? [];
    document.getElementById('updated').textContent = `最終更新: ${timeAgo(data.updated_at)}`;
    renderAll();
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="loading" style="color:var(--red)">データを読み込めませんでした (${e.message})</div>`;
  }
}

// ── 全体レンダリング ──────────────────────────────────────────
function renderAll() {
  const root = document.getElementById('root');
  root.innerHTML = `
    <div class="tabs" id="tabs"></div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-title">ランキング — <span id="bar-title">${activeTab.toUpperCase()}</span></div>
        <canvas id="barChart" height="260"></canvas>
      </div>
      <div class="card">
        <div class="card-title">総合比較 — <span>レーダーチャート</span></div>
        <canvas id="radarChart" height="260"></canvas>
      </div>
    </div>
    <div class="top-cards" id="topCards"></div>
    <div class="card">
      <div class="card-title">全データ — <span>クリックで並び替え</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr id="thead"></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  `;

  renderTabs();
  renderBarChart();
  renderRadarChart();
  renderTopCards();
  renderTable();
}

// ── タブ ─────────────────────────────────────────────────────
function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t =>
    `<button class="tab${t.key===activeTab?' active':''}" onclick="switchTab('${t.key}')">${t.label}</button>`
  ).join('');
}
function switchTab(key) {
  activeTab = key;
  const tab = TABS.find(t=>t.key===key);
  sortKey = tab.stat;
  sortAsc = false;
  document.getElementById('bar-title').textContent = key.toUpperCase();
  renderTabs();
  renderBarChart();
  renderTable();
}

// ── バーチャート ──────────────────────────────────────────────
function renderBarChart() {
  const tab  = TABS.find(t=>t.key===activeTab);
  const stat = tab.stat;
  const sorted = [...players].sort((a,b)=>sv(b,stat)-sv(a,stat));
  const labels = sorted.map(p=>`${p.name}#${p.tag}`);
  const values = sorted.map(p=>sv(p,stat));

  const bgColors = sorted.map((_,i)=>{
    if(i===0) return 'rgba(240,178,50,0.85)';
    if(i===1) return 'rgba(192,192,192,0.75)';
    if(i===2) return 'rgba(205,127,50,0.75)';
    return 'rgba(255,70,85,0.55)';
  });
  const borderColors = sorted.map((_,i)=>{
    if(i===0) return '#f0b232';
    if(i===1) return '#c0c0c0';
    if(i===2) return '#cd7f32';
    return '#ff4655';
  });

  if (barChart) barChart.destroy();
  const ctx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 2,
        borderRadius: 6,
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${tab.disp(ctx.raw)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#7d8da5', font: { size: 11 } },
        },
        y: {
          grid: { display: false },
          ticks: { color: '#e6edf3', font: { size: 12, weight: '700' } },
        }
      },
      animation: { duration: 600, easing: 'easeOutQuart' }
    }
  });
}

// ── レーダーチャート ──────────────────────────────────────────
function renderRadarChart() {
  const datasets = players.map((p, i) => ({
    label: `${p.name}#${p.tag}`,
    data: RADAR_STATS.map(s => normalize(sv(p, s.stat), s.max)),
    backgroundColor: PALETTE[i % PALETTE.length] + '22',
    borderColor: PALETTE[i % PALETTE.length],
    borderWidth: 2,
    pointBackgroundColor: PALETTE[i % PALETTE.length],
    pointRadius: 4,
    pointHoverRadius: 6,
  }));

  if (radarChart) radarChart.destroy();
  const ctx = document.getElementById('radarChart').getContext('2d');
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: { labels: RADAR_STATS.map(s=>s.label), datasets },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#e6edf3', font: { size: 11 }, padding: 12, boxWidth: 12 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.raw.toFixed(0)}pts`
          }
        }
      },
      scales: {
        r: {
          min: 0, max: 100,
          grid: { color: 'rgba(255,255,255,0.08)' },
          angleLines: { color: 'rgba(255,255,255,0.08)' },
          ticks: { display: false },
          pointLabels: { color: '#7d8da5', font: { size: 12, weight: '700' } }
        }
      },
      animation: { duration: 800, easing: 'easeOutQuart' }
    }
  });
}

// ── トップカード ──────────────────────────────────────────────
function renderTopCards() {
  if (!players.length) return;
  document.getElementById('topCards').innerHTML = TOP_CARDS.map(c => {
    const p = topPlayer(c.stat);
    if (!p) return '';
    return `
      <div class="top-card">
        <div class="top-card-label">${c.label}</div>
        <div class="top-card-player">${p.name}#${p.tag}</div>
        <div class="top-card-value">${c.fmt(sv(p,c.stat))}</div>
      </div>`;
  }).join('');
}

// ── テーブル ──────────────────────────────────────────────────
function renderTable() {
  const sorted = [...players].sort((a,b)=>{
    const va=sv(a,sortKey), vb=sv(b,sortKey);
    return sortAsc ? va-vb : vb-va;
  });

  // ヘッダー
  document.getElementById('thead').innerHTML = TABLE_COLS.map(col => {
    const special = ['__rank__','__name__','__peak__'].includes(col.key);
    if (special) return `<th>${col.label}</th>`;
    const isSorted = col.key===sortKey;
    const arrow = isSorted ? (sortAsc?'▲':'▼') : '';
    return `<th class="${isSorted?'sorted':''}" onclick="doSort('${col.key}')">${col.label} ${arrow}</th>`;
  }).join('');

  // ボディ
  const MEDALS = ['🥇','🥈','🥉'];
  document.getElementById('tbody').innerHTML = sorted.map((p,i) => {
    const url = `https://tracker.gg/valorant/profile/riot/${encodeURIComponent(p.name)}%23${p.tag}/overview`;
    return `<tr>${TABLE_COLS.map(col=>{
      if(col.key==='__rank__')
        return `<td class="medal">${i<3?MEDALS[i]:`<span style="color:var(--muted)">${i+1}</span>`}</td>`;
      if(col.key==='__name__')
        return `<td><a class="player-link" href="${url}" target="_blank"><span class="pname">${p.name}</span><span class="ptag"> #${p.tag}</span></a></td>`;
      if(col.key==='__peak__')
        return `<td class="rank-badge">${p.peak_rank??'-'}</td>`;
      const hl = col.key===sortKey ? ' class="hl"' : '';
      return `<td${hl}>${dv(p,col.key)}</td>`;
    }).join('')}</tr>`;
  }).join('');
}

function doSort(key) {
  sortAsc = sortKey===key ? !sortAsc : false;
  sortKey = key;
  renderTable();
  // タブも同期
  const tab = TABS.find(t=>t.stat===key);
  if(tab && tab.key!==activeTab) { activeTab=tab.key; renderTabs(); }
}

// ── 起動 ─────────────────────────────────────────────────────
loadData();
setInterval(loadData, 5*60*1000);
</script>
</body>
</html>
